{% extends 'base.html' %}
{% block content %}
<style>
:root{--surface:#0f1720;--accent:#4c9efe;--muted:rgba(255,255,255,0.75);color-scheme:dark}
body{background:var(--surface);color:#f8f9fa!important;font-family:Inter,system-ui,-apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial;font-size:16px;line-height:1.6}
.container{max-width:1100px}
.card{background:#ffffff!important;border:1px solid #dee2e6!important;border-radius:12px;color:#1a1a1a!important;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
.card,.card *{color:#1a1a1a!important}
h1,h2,h3,h4,h5,h6{color:#f8f9fa!important;font-weight:600;margin-bottom:1rem}
.card h1,.card h2,.card h3,.card h4,.card h5,.card h6{color:#1a1a1a!important}
p,div,span,label{color:#f8f9fa!important}
.card p,.card div,.card span,.card label{color:#1a1a1a!important}
.text-muted{color:rgba(248,249,250,0.85)!important}
.card .text-muted{color:#495057!important}
a{color:var(--accent)!important;text-decoration:none}
a:hover{color:#6ba3ff!important;text-decoration:underline}
input.form-control,textarea.form-control,select.form-select{color:#1a1a1a!important;background:#ffffff!important;border:1px solid #ced4da!important}
input.form-control:focus,textarea.form-control:focus,select.form-select:focus{border-color:var(--accent)!important;box-shadow:0 0 0 0.2rem rgba(76,158,254,0.25)!important}
.table{color:#1a1a1a!important}
.table-dark{background:#212529!important;color:#f8f9fa!important}
.table-striped>tbody>tr:nth-of-type(odd){background-color:rgba(0,0,0,0.05)!important}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#1a1a1a!important}
.btn-primary:hover{background:#3a8aee;border-color:#3a8aee;color:#1a1a1a!important}
.btn-success{background:#28a745;border-color:#28a745;color:#1a1a1a!important}
.btn-danger{background:#dc3545;border-color:#dc3545;color:#1a1a1a!important}
.btn-warning{background:#ffc107;border-color:#ffc107;color:#1a1a1a!important}
.btn-info{background:#17a2b8;border-color:#17a2b8;color:#1a1a1a!important}
.list-group-item{background:#ffffff!important;color:#1a1a1a!important;border:1px solid #dee2e6!important}
label,.form-label{color:#f8f9fa!important;font-weight:500;margin-bottom:0.5rem}
.card label,.card .form-label{color:#1a1a1a!important}
strong,b{color:#f8f9fa!important;font-weight:600}
.card strong,.card b{color:#1a1a1a!important}
.text-primary{color:var(--accent)!important}
.table td,.table th{padding:12px!important;vertical-align:middle;color:#1a1a1a!important}
.table-dark td,.table-dark th{color:#f8f9fa!important}
.card-header{background:#212529!important;color:#f8f9fa!important;border-bottom:1px solid #dee2e6}
.card-header h5,.card-header h4,.card-header h3{color:#f8f9fa!important}
.card a:not(.btn){color:var(--accent)!important}
.card a:not(.btn):hover{color:#3a8aee!important;text-decoration:underline}
.badge{color:#f8f9fa!important;font-weight:500}
.badge.bg-warning{color:#1a1a1a!important}
.card-body *{color:#1a1a1a!important}
.card-body h1,.card-body h2,.card-body h3,.card-body h4,.card-body h5,.card-body h6{color:#1a1a1a!important}
.btn-outline-primary{color:var(--accent)!important;border-color:var(--accent)!important;background:transparent!important}
.btn-outline-primary:hover{color:#ffffff!important;background:var(--accent)!important;border-color:var(--accent)!important}
.btn-outline-secondary{color:#495057!important;border-color:#6c757d!important;background:transparent!important}
.btn-outline-secondary:hover{color:#ffffff!important;background:#6c757d!important;border-color:#6c757d!important}
*{visibility:visible!important}
.card,.card *{visibility:visible!important}
</style>
<div class="card">
  <div class="card-body">
    <h3 class="mb-4">Create Warehouse</h3>
    
    <form method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      
      <div class="mb-3">
        <label for="warehouse_name" class="form-label">Warehouse Name <span class="text-danger">*</span></label>
        <input type="text" 
               class="form-control" 
               id="warehouse_name" 
               name="warehouse_name" 
               required 
               maxlength="200"
               placeholder="Enter warehouse name">
      </div>
      
      <div class="mb-3">
        <label for="capacity" class="form-label">Capacity</label>
        <input type="number" 
               class="form-control" 
               id="capacity" 
               name="capacity" 
               min="0"
               placeholder="Enter capacity (optional)">
        <small class="form-text text-muted">Maximum storage capacity (optional)</small>
      </div>
      
      <div class="mb-3 form-check">
        <input type="checkbox" 
               class="form-check-input" 
               id="is_refrigerated" 
               name="is_refrigerated" 
               value="1">
        <label class="form-check-label" for="is_refrigerated">
          Is Refrigerated
        </label>
        <small class="form-text text-muted d-block">Check if this warehouse requires refrigeration</small>
      </div>
      
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">Create Warehouse</button>
        <a href="{{ url_for('warehouse.index') }}" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
